<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retention OS | System Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #0f172a; overflow-x: hidden; }
        .bg-grid-pattern { background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 24px 24px; }
        .glass-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.9); }
    </style>
</head>
<body class="min-h-screen relative">
    <div class="fixed inset-0 w-full h-full -z-10 bg-slate-50">
        <div class="absolute inset-0 bg-grid-pattern opacity-40"></div>
    </div>

    <nav class="bg-white/70 backdrop-blur-xl border-b border-white sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-6 lg:px-8 flex justify-between items-center h-16">
            <div class="flex items-center space-x-8">
                <div class="flex items-center">
                    <div class="h-8 w-8 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-lg flex items-center justify-center mr-3 shadow-md shadow-indigo-200">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    </div>
                    <span class="font-extrabold text-xl bg-clip-text text-transparent bg-gradient-to-r from-slate-900 to-slate-700 tracking-tight">Retention OS</span>
                </div>
                <div class="hidden md:flex space-x-2">
                    <a href="dashboard.html" id="nav-dash" class="flex items-center px-4 py-2 text-slate-500 hover:text-slate-900 hover:bg-slate-100 rounded-lg font-semibold text-sm transition-all">Dashboard</a>
                    <a href="simulator.html" id="nav-sim" class="flex items-center px-4 py-2 text-slate-500 hover:text-slate-900 hover:bg-slate-100 rounded-lg font-semibold text-sm transition-all">Simulator</a>
                    <a href="admin.html" id="admin-nav-tab" class="hidden flex items-center px-4 py-2 text-slate-500 hover:text-slate-900 hover:bg-slate-100 rounded-lg font-semibold text-sm transition-all">Admin Control</a>
                </div>
            </div>
            
            <div class="flex items-center space-x-4 ml-auto pl-6 border-l border-slate-200">
                <div class="text-right hidden md:block">
                    <p class="text-xs font-extrabold text-slate-900 leading-none" id="user-name-display">--</p>
                    <span id="user-role-badge" class="mt-1 inline-block">--</span>
                </div>
                <div class="relative group">
                    <button class="h-10 w-10 bg-white rounded-2xl border border-slate-200 shadow-sm flex items-center justify-center hover:ring-4 hover:ring-indigo-500/10 transition-all overflow-hidden">
                        <svg class="w-5 h-5 text-slate-400" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                    </button>
                    <div class="absolute right-0 mt-3 w-48 bg-white rounded-2xl shadow-2xl border border-slate-100 py-3 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 z-[100] transform origin-top-right group-hover:translate-y-0 translate-y-2">
                        <button onclick="handleLogout()" class="w-full flex items-center px-4 py-2.5 text-xs font-bold text-rose-500 hover:bg-rose-50 transition-colors">Sign Out</button>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto w-full px-6 lg:px-8 py-12 relative z-10">
     <div id="statusMessage" class="hidden mb-6 p-4 rounded-2xl text-xs font-bold border transition-all duration-500 shadow-sm"></div>
        <header class="mb-10 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">System Administration</h1>
                <p class="text-slate-500 mt-2 text-base font-medium">Manage user permissions and trigger backend AI synchronization.</p>
            </div>
            <div class="flex space-x-3">
                <button onclick="document.getElementById('createUserModal').classList.remove('hidden')" class="bg-white border border-slate-200 text-slate-700 px-6 py-3 rounded-2xl font-bold hover:bg-slate-50 transition-all text-xs uppercase tracking-widest shadow-sm">+ Create User</button>
                <button id="update-pipeline-btn" onclick="triggerPipeline()" 
                class="flex items-center gap-3 bg-gradient-to-r from-indigo-600 to-purple-600 text-white px-8 py-3 rounded-2xl font-bold shadow-lg hover:shadow-indigo-300 transition-all text-xs uppercase tracking-widest disabled:opacity-70 disabled:cursor-not-allowed">
                
                <svg id="pipeline-spinner" class="hidden animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                
                <span id="pipeline-btn-text">Update Pipeline</span>
                </button>
        </header>

        <div class="glass-card rounded-3xl overflow-hidden shadow-xl">
            <div class="px-8 py-6 border-b border-slate-100 bg-white/40"><h2 class="text-lg font-bold text-slate-900">Access Control List</h2></div>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead class="bg-slate-50/50 text-slate-400 font-bold uppercase tracking-widest text-[10px]">
                        <tr><th class="px-8 py-5">System User</th><th class="px-8 py-5">Email Address</th><th class="px-8 py-5">Status</th><th class="px-8 py-5 text-right">Actions</th></tr>
                    </thead>
                    <tbody id="user-list" class="divide-y divide-slate-100/80 bg-white/20"></tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="createUserModal" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/40 backdrop-blur-sm">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md">
            <h3 class="text-xl font-bold text-slate-900 mb-6 font-extrabold">Create New Account</h3>
            <div class="space-y-4">
                <input type="text" id="new-name" placeholder="Full Name" class="w-full border border-slate-200 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-indigo-500 text-sm font-semibold">
                <input type="email" id="new-email" placeholder="Email (admin@churn.os for Master)" class="w-full border border-slate-200 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-indigo-500 text-sm font-semibold">
                <input type="password" id="new-password" placeholder="Password" class="w-full border border-slate-200 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-indigo-500 text-sm font-semibold">
                <div class="flex space-x-3 pt-4">
                    <button onclick="document.getElementById('createUserModal').classList.add('hidden')" class="flex-1 px-4 py-3 rounded-xl font-bold text-slate-400 bg-slate-100 text-[10px] tracking-widest">CANCEL</button>
                    <button onclick="handleCreateUser()" class="flex-1 px-4 py-3 rounded-xl font-bold text-white bg-indigo-600 text-[10px] tracking-widest">PROCEED</button>
                </div>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        function showMessage(text, isError = false) {
    const msgDiv = document.getElementById('statusMessage');
    if (!msgDiv) return;
    
    msgDiv.innerText = text;
    msgDiv.classList.remove('hidden', 'bg-emerald-50', 'text-emerald-600', 'border-emerald-100', 'bg-rose-50', 'text-rose-600', 'border-rose-100');
    
    if (isError) {
        msgDiv.classList.add('bg-rose-50', 'text-rose-600', 'border-rose-100');
    } else {
        msgDiv.classList.add('bg-emerald-50', 'text-emerald-600', 'border-emerald-100');
    }
    
    msgDiv.classList.remove('hidden');
    setTimeout(() => msgDiv.classList.add('hidden'), 6000);
}
        async function loadUsers() {
            const currentUser = JSON.parse(localStorage.getItem('user'));
            const res = await fetch('http://127.0.0.1:8000/api/admin/users');
            const users = await res.json();
            
            const tbody = document.getElementById('user-list');
            tbody.innerHTML = users.map(u => {
                const isMaster = u.email === "admin@churn.os"; // THE SHIELD
                const isSelf = u.id === currentUser.user_id; // THE SAFETY
                
                return `
                    <tr class="hover:bg-indigo-50/30 transition-colors group">
                        <td class="px-8 py-6 font-bold text-slate-900">${u.full_name}</td>
                        <td class="px-8 py-6 text-slate-500">${u.email}</td>
                        <td class="px-8 py-6"><span class="px-3 py-1.5 ${u.is_admin ? 'bg-indigo-100 text-indigo-700 border-indigo-200' : 'bg-slate-100 text-slate-500 border-slate-200'} rounded-lg text-[10px] font-bold border uppercase tracking-tighter">${u.is_admin ? 'Administrator' : 'Staff'}</span></td>
                        <td class="px-8 py-6 text-right">
                            ${(isMaster || isSelf) ? `<span class="text-[10px] font-bold text-slate-400 italic">Protected</span>` : 
                            `<button onclick="changeRole(${u.id}, '${u.is_admin ? 'demote' : 'promote'}')" class="text-xs font-bold ${u.is_admin ? 'text-rose-600' : 'text-indigo-600'} opacity-0 group-hover:opacity-100 transition-opacity">
                                ${u.is_admin ? 'Revoke Admin' : 'Grant Admin'}
                            </button>`}
                        </td>
                    </tr>`;
            }).join('');
        }

        async function handleCreateUser() {
            const payload = {
                full_name: document.getElementById('new-name').value,
                email: document.getElementById('new-email').value,
                password: document.getElementById('new-password').value
            };
            const res = await fetch('http://127.0.0.1:8000/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if(res.ok) {
                document.getElementById('createUserModal').classList.add('hidden');
                loadUsers();
            }
        }

        async function changeRole(targetId, action) {
            const adminId = JSON.parse(localStorage.getItem('user')).user_id;
            await fetch(`http://127.0.0.1:8000/api/admin/${action}/${targetId}?admin_id=${adminId}`, { method: 'POST' });
            loadUsers();
        }
async function triggerPipeline() {
    const btn = document.getElementById('update-pipeline-btn');
    const spinner = document.getElementById('pipeline-spinner');
    const btnText = document.getElementById('pipeline-btn-text');

    btn.disabled = true;
    spinner.classList.remove('hidden');
    btnText.innerText = "INITIALIZING..."; // This shows while the web request is in flight

    try {
        const res = await fetch('http://127.0.0.1:8000/api/admin/retrain', { method: 'POST' });
        const data = await res.json();

        if (res.ok && data.status === "success") {
            // SUCCESS: The background process has started!
            showMessage("🚀 " + data.message);
            
            // CHANGE THIS: Immediately update text to show it's now running in the background
            btnText.innerText = "PIPELINE RUNNING..."; 

            const pollInterval = setInterval(async () => {
                const finished = await checkPipelineStatus();
                if (finished) {
                    clearInterval(pollInterval);
                    resetBtn(); // Stop spinner and re-enable button when .txt file says SUCCESS
                }
            }, 3000); 

        } else {
            throw new Error(data.error || "Failed to start pipeline");
        }
    } catch (error) {
        showMessage("❌ " + error.message, true);
        resetBtn();
    }

    function resetBtn() {
        btn.disabled = false;
        spinner.classList.add('hidden');
        btnText.innerText = "Update Pipeline";
    }
}
        
    async function checkPipelineStatus() {
    try {
        const res = await fetch('http://127.0.0.1:8000/api/admin/pipeline-status');
        const data = await res.json();
        
        // Logical check against the status file format: STATUS|TIME|MSG
        if (data.status === "SUCCESS") {
            showMessage(`✅ Update Complete: ${data.message}`);
            return true; // Stop polling
        } else if (data.status === "FAILED") {
            showMessage(`❌ Update Failed: ${data.message}`, true);
            return true; // Stop polling
        }
        return false; // Still processing
    } catch (e) {
        return false; // Keep trying if the network blips
    }
}




        window.onload = loadUsers;
    </script>
</body>
</html>
